<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffre NPS Premium</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: url('boulanger.jpg') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 20px;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(8, 15, 30, 0.68);
      backdrop-filter: blur(5px);
    }

    .wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1180px;
    }

    .hero {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 34px;
      background: rgba(10, 18, 36, 0.58);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 30px;
      padding: 34px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
    }

    .left, .right {
      flex: 1;
      min-width: 0;
      display: flex;
    }

    .left {
      align-items: center;
      justify-content: center;
    }

    .right {
      align-items: center;
    }

    .coffre-zone {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 430px;
    }

    .glow {
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,235,160,0.98) 0%, rgba(255,214,92,0.65) 34%, rgba(255,214,92,0.18) 62%, transparent 100%);
      opacity: 0;
      transform: scale(0.6);
      transition: all 0.85s ease;
      filter: blur(16px);
      z-index: 1;
      pointer-events: none;
    }

    .glow.active {
      width: 620px;
      height: 620px;
      opacity: 1;
      transform: scale(1);
    }

    .coffre-img {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 520px;
      max-height: 470px;
      object-fit: cover;
      border-radius: 24px;
      box-shadow: 0 28px 70px rgba(0,0,0,0.48);
      transition: transform 0.75s ease, box-shadow 0.75s ease, opacity 0.35s ease;
      display: block;
      margin: 0 auto;
    }

    .coffre-img.open {
      transform: scale(1.06);
      box-shadow: 0 40px 110px rgba(255,200,80,0.30);
    }

    .panel {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 32px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    h1 {
      margin: 0 0 12px;
      color: white;
      font-size: 46px;
      line-height: 1.05;
    }

    .desc {
      margin: 0 0 22px;
      color: rgba(255,255,255,0.86);
      font-size: 18px;
      line-height: 1.55;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border: 2px solid rgba(255,255,255,0.10);
      border-radius: 15px;
      background: rgba(255,255,255,0.98);
      text-align: center;
      font-size: 17px;
      outline: none;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 16px 18px;
      border: none;
      border-radius: 15px;
      background: linear-gradient(135deg, #ffbf1f, #f28c00);
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 16px 30px rgba(242,140,0,0.32);
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.25s ease;
    }

    button:hover {
      opacity: 0.97;
      box-shadow: 0 20px 36px rgba(242,140,0,0.38);
    }

    button:active {
      transform: scale(0.985);
    }

    #message {
      min-height: 28px;
      margin-top: 16px;
      font-weight: 700;
      font-size: 19px;
    }

    .surprise {
      display: none;
      margin-top: 18px;
      padding: 20px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(34,197,94,0.18), rgba(255,191,31,0.22));
      border: 1px solid rgba(255,255,255,0.16);
      color: white;
      font-size: 18px;
      line-height: 1.55;
      animation: pop 0.35s ease;
      box-shadow: 0 18px 36px rgba(0,0,0,0.22);
    }

    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .flash {
      animation: flash 1s ease 1;
    }

    @keyframes pop {
      0% { transform: scale(0.94); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes flash {
      0% { box-shadow: 0 0 0 rgba(255,220,120,0); }
      50% { box-shadow: 0 0 60px rgba(255,220,120,0.42); }
      100% { box-shadow: 0 0 0 rgba(255,220,120,0); }
    }

    @media (max-width: 900px) {
      .hero {
        flex-direction: column;
        padding: 22px;
      }

      .coffre-zone {
        min-height: 280px;
      }

      .coffre-img {
        max-width: 100%;
        max-height: 320px;
      }

      h1 {
        font-size: 36px;
        text-align: center;
      }

      .desc {
        text-align: center;
        font-size: 16px;
      }

      .panel {
        padding: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="hero">

      <div class="left">
        <div class="coffre-zone">
          <div id="glow" class="glow"></div>
          <img id="coffre" class="coffre-img" src="coffre-ferme.png" alt="Coffre fermé">
        </div>
      </div>

      <div class="right">
        <div id="panel" class="panel">
          <h1>Coffre NPS</h1>
          <p class="desc">Trouvez le mot secret pour ouvrir le coffre premium de Boulanger Wittenheim.</p>

          <input type="text" id="mot" placeholder="Entre le mot secret">
          <button onclick="verifier()">Ouvrir le coffre</button>

          <p id="message"></p>

          <div id="surprise" class="surprise">
            🎁 <strong>Surprise débloquée</strong><br>
            Bravo à toute l’équipe de Boulanger Wittenheim 🔥
            <div class="badge">COFFRE OUVERT AVEC SUCCÈS</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const MOT_SECRET = "PROMOTEUR";
    const MAX_ESSAIS = 5;
    let essais = 0;
    let ouvert = false;

    function verifier() {
      const motEntre = document.getElementById("mot").value.toUpperCase().trim();
      const message = document.getElementById("message");
      const coffre = document.getElementById("coffre");
      const surprise = document.getElementById("surprise");
      const glow = document.getElementById("glow");
      const panel = document.getElementById("panel");

      if (ouvert) return;

      if (essais >= MAX_ESSAIS) {
        message.textContent = "⛔ Trop d'essais";
        message.style.color = "#f59e0b";
        return;
      }

      essais++;

      if (motEntre === MOT_SECRET) {
        ouvert = true;
        coffre.src = "coffre-ouvert.png";
        coffre.classList.add("open");
        glow.classList.add("active");
        panel.classList.add("flash");
        message.textContent = "🎉 Coffre ouvert !";
        message.style.color = "#4ade80";
        surprise.style.display = "block";
      } else {
        message.textContent = "❌ Mauvais mot (" + essais + "/" + MAX_ESSAIS + ")";
        message.style.color = "#f87171";
      }
    }
  </script>

</body>
</html>
