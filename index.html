<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffre NPS Premium</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  background:url('boulanger.jpg') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
  position:relative;
}

body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(10,15,30,0.7);
  backdrop-filter:blur(6px);
}

.container{
  position:relative;
  z-index:2;
  width:100%;
  max-width:420px;
  background:rgba(20,25,45,0.7);
  border-radius:20px;
  padding:20px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* IMAGE COFFRE */
.coffre{
  width:100%;
  max-height:200px;
  object-fit:cover;
  border-radius:16px;
  margin-bottom:15px;
  transition:0.5s;
}

/* TITRE */
h1{
  color:white;
  font-size:26px;
  margin-bottom:10px;
}

/* TEXTE */
.desc{
  color:#ddd;
  font-size:14px;
  margin-bottom:15px;
  line-height:1.4;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-bottom:10px;
  text-align:center;
  font-size:15px;
}

/* BOUTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#ffbf1f,#f28c00);
  color:white;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
}

/* MESSAGE */
#message{
  margin-top:12px;
  font-weight:bold;
}

/* SURPRISE */
.surprise{
  display:none;
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:rgba(0,200,100,0.2);
  color:white;
  font-size:14px;
}

/* EFFET OUVERT */
.open{
  transform:scale(1.05);
  box-shadow:0 0 40px rgba(255,200,100,0.5);
}

/* RESPONSIVE PC */
@media(min-width:768px){
  .container{
    max-width:600px;
    padding:30px;
  }
  h1{font-size:34px}
  .desc{font-size:16px}
  input,button{font-size:16px;padding:14px}
}
</style>
</head>

<body>

<div class="container">

<img id="coffre" src="coffre-ferme.png" class="coffre">

<h1>Coffre NPS</h1>

<p class="desc">
Trouvez le mot secret pour ouvrir le coffre premium de Boulanger Wittenheim.
</p>

<input type="text" id="mot" placeholder="Entre le mot secret">

<button onclick="verifier()">Ouvrir le coffre</button>

<p id="message"></p>

<div id="surprise" class="surprise">
🎁 Surprise débloquée<br>
Bravo à toute l’équipe 🔥
</div>

</div>

<script>
const motSecret = "PROMOTEUR";

function verifier(){
  let input = document.getElementById("mot").value.toUpperCase();
  let message = document.getElementById("message");
  let coffre = document.getElementById("coffre");
  let surprise = document.getElementById("surprise");

  if(input === motSecret){
    message.innerHTML = "🎉 Coffre ouvert !";
    message.style.color = "lightgreen";

    coffre.src = "coffre-ouvert.png";
    coffre.classList.add("open");

    surprise.style.display = "block";
  } else {
    message.innerHTML = "❌ Mauvais mot";
    message.style.color = "red";
  }
}
</script>

</body>
</html>
