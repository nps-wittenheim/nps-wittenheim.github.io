<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Coffre</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  min-height:100vh;
  background:url('boulanger.jpg') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* OVERLAY */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(10,15,30,0.75);
  backdrop-filter:blur(6px);
}

/* CONTAINER */
.container{
  position:relative;
  z-index:2;
  width:100%;
  max-width:900px;
  background:rgba(20,25,45,0.8);
  border-radius:25px;
  padding:30px;
  box-shadow:0 30px 80px rgba(0,0,0,0.5);
  display:flex;
  gap:30px;
  align-items:center;
}

/* IMAGE */
.coffre{
  width:100%;
  max-width:350px;
  border-radius:20px;
  transition:0.4s;
}

/* TEXTE */
.content{
  flex:1;
  text-align:left;
  color:white;
}

h1{
  font-size:40px;
  margin-bottom:15px;
}

.desc{
  font-size:18px;
  line-height:1.5;
  margin-bottom:20px;
  opacity:0.9;
}

/* INPUT */
input{
  width:100%;
  padding:15px;
  border-radius:12px;
  border:none;
  margin-bottom:10px;
  font-size:16px;
}

/* BUTTON */
button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  background:linear-gradient(135deg,#ffcc3d,#f29a15);
  color:white;
  cursor:pointer;
}

/* MESSAGE */
#message{
  margin-top:10px;
  font-weight:bold;
}

/* SURPRISE */
.surprise{
  display:none;
  margin-top:15px;
  padding:15px;
  border-radius:15px;
  background:rgba(0,255,100,0.2);
}

/* MOBILE */
@media(max-width:768px){
  .container{
    flex-direction:column;
    text-align:center;
  }

  .content{
    text-align:center;
  }

  h1{
    font-size:28px;
  }

  .desc{
    font-size:14px;
  }
}
</style>
</head>

<body>

<div class="container">

<img id="coffre" src="coffre-ferme.png" class="coffre">

<div class="content">

<h1>Le Coffre</h1>

<p class="desc">
Le coffre est verrouillé.<br>
Un seul mot peut le débloquer…<br>
À vous de le découvrir.
</p>

<input type="text" id="mot" placeholder="Entre le mot secret">

<button onclick="verifier()">Ouvrir le coffre</button>

<p id="message"></p>

<div id="surprise" class="surprise">
🎁 Bravo à toute l’équipe 🔥<br>
COFFRE OUVERT AVEC SUCCÈS
</div>

</div>
</div>

<script>

const motSecret = "PROMOTEUR";

function verifier(){
  let input = document.getElementById("mot").value.toUpperCase();
  let message = document.getElementById("message");
  let coffre = document.getElementById("coffre");
  let surprise = document.getElementById("surprise");

  if(input === motSecret){
    message.innerHTML = "🎉 Coffre ouvert !";
    message.style.color = "lightgreen";
    coffre.src = "coffre-ouvert.png";
    surprise.style.display = "block";
  } else {
    message.innerHTML = "❌ Mauvais mot";
    message.style.color = "red";
  }
}

</script>

</body>
</html>
